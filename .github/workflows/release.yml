name: 🎉 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump
        required: true
        type: choice
        default: patch
        options:
          - major
          - minor
          - patch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    if: ${{ github.event.inputs.version != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: 🔢 Compute release version
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const bump = process.env.VERSION_BUMP;
          const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(pkg.version);

          if (!match) {
            throw new Error(`Invalid package version: ${pkg.version}`);
          }

          let [, major, minor, patch] = match.map(Number);

          if (bump === 'major') {
            major += 1;
            minor = 0;
            patch = 0;
          } else if (bump === 'minor') {
            minor += 1;
            patch = 0;
          } else if (bump === 'patch') {
            patch += 1;
          } else {
            throw new Error(`Invalid version bump: ${bump}`);
          }

          const version = `${major}.${minor}.${patch}`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          NODE
        env:
          VERSION_BUMP: ${{ github.event.inputs.version }}

      - name: Configure git author
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: 📝 Create release commit and tag
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: pnpm release -- --version "${RELEASE_VERSION}" --yes

  release-npm:
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: 🚚 Install & Build & Publish
        run: |
          pnpm i
          pnpm build
          pnpm publish --access public -r --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
