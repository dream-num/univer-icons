name: 🚀 Deploy Demo

on:
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Test demo catalogue
        run: pnpm --filter ./packages/app test

      - name: Build demo
        run: pnpm --filter ./packages/app exec vite build --base=/univer-icons/

      - name: Check Pages configuration
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/dev/null 2>&1; then
            exit 0
          fi

          if [ -z "$PAGES_TOKEN" ]; then
            echo "::error::GitHub Pages is not enabled for this repository. Enable Pages with source 'GitHub Actions', or add a GH_TOKEN secret so this workflow can enable it automatically."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
